# Triggered manually OR on a tag push matching v*.* (e.g. v0.2.0).
# Does two things:
#   1. Builds the release AAR (`./gradlew :library:assembleRelease`)
#   2. Creates a GitHub Release with the AAR attached.
#
# JitPack picks up the tag automatically — consumers add:
#   maven { url 'https://jitpack.io' }
#   implementation "io.twostars:sdk:0.2.0"
# JitPack runs the same `./gradlew :library:assembleRelease` to produce
# the artifact on demand, so this workflow's AAR is mirror — useful for
# customers who can't reach jitpack.io.

name: Release

on:
  push:
    tags: [ 'v*.*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag + release (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Build release AAR
        run: ./gradlew :library:assembleRelease --no-daemon

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            library/build/outputs/aar/library-release.aar
