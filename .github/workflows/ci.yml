# Runs on every push + PR. Builds the library + sample, runs the JVM
# unit-test suite. Failure here blocks merging; success means JitPack
# can build the same way on demand from a release tag.
#
# Note: hardware-on-device tests (instrumented tests requiring a
# connected emulator) are NOT run here — gated behind a separate
# `e2e.yml` workflow that fires manually before a release.

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Cache the gradle dirs so subsequent runs are ~3x faster on the
      # CI runner; safe to skip if you trust the lock-file.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-

      - name: Build library (debug + release)
        run: ./gradlew :library:assemble --no-daemon --stacktrace

      - name: Run JVM unit tests
        run: ./gradlew :library:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: library/build/reports/tests/
